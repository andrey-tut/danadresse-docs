<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Danadresse API — Swagger UI</title>
  <meta name="description" content="Swagger UI for the Danadresse API — drop-in DAWA replacement (Danish addresses). Try endpoints live." />
  <link rel="icon" href="https://danadresse.dk/static/img/logo_mark.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin:0 }
    .topbar { display:flex; align-items:center; gap:14px; padding:10px 20px;
      background:#0A1628; color:#fff; font-family:-apple-system,Segoe UI,Roboto,sans-serif; font-size:14px; }
    .topbar a { color:#7CC4FF; text-decoration:none } .topbar .sp { flex:1 }
    .topbar .dot { width:11px;height:11px;border-radius:50%;background:#FF6B6B;display:inline-block }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="dot"></span><strong>Danadresse API</strong>
    <span class="sp"></span>
    <a href="index.html">Redoc</a>
    <a href="https://danadresse.dk">danadresse.dk</a>
    <a href="examples/">Examples</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: "openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: "BaseLayout",
      });
    };
  </script>
</body>
</html>
